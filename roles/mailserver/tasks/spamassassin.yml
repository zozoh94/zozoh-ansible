---
- name: Deploy SpamAssassin configuration
  ansible.builtin.template:
    src: spamassassin/local.cf.j2
    dest: /etc/spamassassin/local.cf
    owner: root
    group: root
    mode: "0644"
  notify: Restart spamassassin

- name: Configure SpamAssassin defaults
  ansible.builtin.lineinfile:
    path: /etc/default/spamd
    regexp: "^OPTIONS="
    line: 'OPTIONS="--create-prefs --max-children {{ mailserver_spamassassin_max_children }} --helper-home-dir"'
  notify: Restart spamassassin

# Debian 12 moved daily rule updates from the /etc/default/spamassassin CRON=
# toggle to a systemd timer. mailserver_spamassassin_cron_update keeps its
# original name but now toggles the timer's state.
- name: Toggle spamassassin-maintenance.timer for daily rule updates
  ansible.builtin.systemd:
    name: spamassassin-maintenance.timer
    enabled: "{{ mailserver_spamassassin_cron_update }}"
    state: "{{ 'started' if mailserver_spamassassin_cron_update else 'stopped' }}"
