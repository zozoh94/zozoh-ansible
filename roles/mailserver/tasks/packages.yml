---
- name: Install mail server packages
  ansible.builtin.apt:
    name:
      - postfix
      - postfix-pgsql
      - postfix-pcre
      - dovecot-core
      - dovecot-imapd
      - dovecot-lmtpd
      - dovecot-pop3d
      - dovecot-pgsql
      - dovecot-sieve
      - dovecot-managesieved
      - opendkim
      - opendkim-tools
      - opendmarc
      - spamassassin
      - spamc
      - postgresql
      - postgresql-contrib
      - certbot
      - python3-certbot-dns-ovh
      - nginx
      - python3-psycopg2
      - python3-venv
      - procmail
      # `acl` provides setfacl, needed by ansible's become-unprivileged-user
      # flow (e.g. switching to the postgres user for community.postgresql.*).
      - acl
    state: present
    update_cache: true

- name: Install ovh Python client into a managed venv
  ansible.builtin.pip:
    name: ovh
    state: present
    virtualenv: /opt/zozoh-mailserver-venv
    # ansible.builtin.pip defaults virtualenv_command to the legacy `virtualenv`
    # CLI (PyPI package, not installed here). Point it at the stdlib venv
    # module so pip creates-or-reuses /opt/zozoh-mailserver-venv on its own.
    virtualenv_command: /usr/bin/python3 -m venv
  when:
    - mailserver_ovh_dns_enabled
    - not ansible_check_mode
