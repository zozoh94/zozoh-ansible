---
- name: Install mail server packages
  ansible.builtin.apt:
    name:
      - postfix
      - postfix-pgsql
      - postfix-pcre
      - dovecot-core
      - dovecot-imapd
      - dovecot-lmtpd
      - dovecot-pop3d
      - dovecot-pgsql
      - dovecot-sieve
      - dovecot-managesieved
      - opendkim
      - opendkim-tools
      - opendmarc
      - spamassassin
      - spamc
      - postgresql
      - postgresql-contrib
      - certbot
      - python3-certbot-dns-ovh
      - nginx
      - python3-psycopg2
      - python3-venv
      - procmail
      # `acl` provides setfacl, needed by ansible's become-unprivileged-user
      # flow (e.g. switching to the postgres user for community.postgresql.*).
      - acl
    state: present
    update_cache: true

- name: Create Python venv for OVH DNS automation
  ansible.builtin.command:
    cmd: python3 -m venv /opt/zozoh-mailserver-venv
  args:
    creates: /opt/zozoh-mailserver-venv/bin/python3
  when: mailserver_ovh_dns_enabled
  # ansible.builtin.command skips itself under --check; the pip task below
  # also short-circuits, so the venv tasks are a real-run-only group.

- name: Install ovh Python client into venv
  ansible.builtin.pip:
    name: ovh
    state: present
    virtualenv: /opt/zozoh-mailserver-venv
  when:
    - mailserver_ovh_dns_enabled
    - not ansible_check_mode
