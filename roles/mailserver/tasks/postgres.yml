---
- name: Ensure PostgreSQL is started
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

# `postgresql.service` is an empty meta-wrapper (ExecStart=/bin/true) that
# reports active even when the real postgresql@<ver>-main instance fails to
# boot. Wait on the socket so a silent cluster failure surfaces here rather
# than at the first query task against a dead socket.
- name: Wait for PostgreSQL socket to accept connections
  ansible.builtin.wait_for:
    path: /var/run/postgresql/.s.PGSQL.5432
    timeout: 30

- name: Create postfix database user
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ mailserver_db_user }}"
    password: "{{ mailserver_db_password }}"
    state: present

- name: Create postfix database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ mailserver_db_name }}"
    owner: "{{ mailserver_db_user }}"
    state: present

- name: Create PostfixAdmin schema tables
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ mailserver_db_name }}"
    query: |
      CREATE TABLE IF NOT EXISTS domain (
        domain VARCHAR(255) NOT NULL,
        description VARCHAR(255) NOT NULL DEFAULT '',
        aliases INTEGER NOT NULL DEFAULT 0,
        mailboxes INTEGER NOT NULL DEFAULT 0,
        maxquota BIGINT NOT NULL DEFAULT 0,
        quota BIGINT NOT NULL DEFAULT 0,
        transport VARCHAR(255) DEFAULT NULL,
        backupmx BOOLEAN NOT NULL DEFAULT FALSE,
        created TIMESTAMPTZ DEFAULT NOW(),
        modified TIMESTAMPTZ DEFAULT NOW(),
        active BOOLEAN NOT NULL DEFAULT TRUE,
        password_expiry INTEGER DEFAULT 0,
        PRIMARY KEY (domain)
      );

      CREATE INDEX IF NOT EXISTS domain_domain_active ON domain (domain, active);

      CREATE TABLE IF NOT EXISTS mailbox (
        username VARCHAR(255) NOT NULL,
        password VARCHAR(255) NOT NULL DEFAULT '',
        name VARCHAR(255) NOT NULL DEFAULT '',
        maildir VARCHAR(255) NOT NULL DEFAULT '',
        quota BIGINT NOT NULL DEFAULT 0,
        created TIMESTAMPTZ DEFAULT NOW(),
        modified TIMESTAMPTZ DEFAULT NOW(),
        active BOOLEAN NOT NULL DEFAULT TRUE,
        domain VARCHAR(255),
        local_part VARCHAR(255) NOT NULL DEFAULT '',
        phone VARCHAR(30) NOT NULL DEFAULT '',
        email_other VARCHAR(255) NOT NULL DEFAULT '',
        token VARCHAR(255) NOT NULL DEFAULT '',
        token_validity TIMESTAMPTZ DEFAULT '2000-01-01 00:00:00+00',
        password_expiry TIMESTAMPTZ DEFAULT '2000-01-01 00:00:00+00',
        PRIMARY KEY (username),
        FOREIGN KEY (domain) REFERENCES domain(domain)
      );

      CREATE INDEX IF NOT EXISTS mailbox_domain_idx ON mailbox (domain);
      CREATE INDEX IF NOT EXISTS mailbox_username_active ON mailbox (username, active);

      CREATE TABLE IF NOT EXISTS alias (
        address VARCHAR(255) NOT NULL,
        goto TEXT NOT NULL,
        domain VARCHAR(255) NOT NULL,
        created TIMESTAMPTZ DEFAULT NOW(),
        modified TIMESTAMPTZ DEFAULT NOW(),
        active BOOLEAN NOT NULL DEFAULT TRUE,
        PRIMARY KEY (address),
        FOREIGN KEY (domain) REFERENCES domain(domain)
      );

      CREATE INDEX IF NOT EXISTS alias_address_active ON alias (address, active);
      CREATE INDEX IF NOT EXISTS alias_domain_idx ON alias (domain);

      CREATE TABLE IF NOT EXISTS alias_domain (
        alias_domain VARCHAR(255) NOT NULL,
        target_domain VARCHAR(255) NOT NULL,
        created TIMESTAMPTZ DEFAULT NOW(),
        modified TIMESTAMPTZ DEFAULT NOW(),
        active BOOLEAN NOT NULL DEFAULT TRUE,
        PRIMARY KEY (alias_domain),
        FOREIGN KEY (alias_domain) REFERENCES domain(domain) ON DELETE CASCADE,
        FOREIGN KEY (target_domain) REFERENCES domain(domain) ON DELETE CASCADE
      );

      CREATE INDEX IF NOT EXISTS alias_domain_active ON alias_domain (alias_domain, active);

- name: Grant database permissions
  become: true
  become_user: postgres
  community.postgresql.postgresql_privs:
    db: "{{ mailserver_db_name }}"
    role: "{{ mailserver_db_user }}"
    type: table
    objs: ALL_IN_SCHEMA
    privs: SELECT,INSERT,UPDATE,DELETE
    schema: public

- name: Ensure ALL domain exists
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ mailserver_db_name }}"
    query: >
      INSERT INTO domain (domain, active) VALUES ('ALL', TRUE)
      ON CONFLICT (domain) DO NOTHING;

- name: Ensure mail domains exist
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ mailserver_db_name }}"
    query: >
      INSERT INTO domain (domain, maxquota, quota, transport, active)
      VALUES ('{{ item }}', 10, 2048, 'virtual', TRUE)
      ON CONFLICT (domain) DO NOTHING;
  loop: "{{ mailserver_domains }}"

- name: Hash mailbox passwords with doveadm
  ansible.builtin.command: doveadm pw -s {{ mailserver_password_scheme }} -p "{{ item.password }}"
  register: _mailserver_hashed_passwords
  loop: "{{ mailserver_mailboxes }}"
  changed_when: false
  no_log: true

- name: Create mailboxes
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ mailserver_db_name }}"
    query: >
      INSERT INTO mailbox (username, password, name, maildir, quota, domain, local_part, active)
      VALUES (
        '{{ item.item.username }}',
        '{{ item.stdout }}',
        '{{ item.item.name | default("") }}',
        '{{ item.item.username.split("@")[1] }}/{{ item.item.username.split("@")[0] }}/',
        {{ item.item.quota_mb | default(mailserver_quota_default_mb) }},
        '{{ item.item.username.split("@")[1] }}',
        '{{ item.item.username.split("@")[0] }}',
        TRUE
      )
      ON CONFLICT (username) DO UPDATE SET
        password = EXCLUDED.password,
        name = EXCLUDED.name,
        quota = EXCLUDED.quota,
        modified = NOW();
  loop: "{{ _mailserver_hashed_passwords.results }}"
  no_log: true

- name: Create aliases
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ mailserver_db_name }}"
    query: >
      INSERT INTO alias (address, goto, domain, active)
      VALUES (
        '{{ item.address }}',
        '{{ item.goto }}',
        '{{ item.address.split("@")[1] }}',
        TRUE
      )
      ON CONFLICT (address) DO UPDATE SET
        goto = EXCLUDED.goto,
        modified = NOW();
  loop: "{{ mailserver_aliases }}"

- name: Build noreply alias list
  ansible.builtin.set_fact:
    _mailserver_noreply_aliases: >-
      {{
        mailserver_domains
        | product(mailserver_noreply_users)
        | map('reverse')
        | map('join', '@')
        | list
      }}
  when: mailserver_noreply_enabled

- name: Create noreply discard aliases
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ mailserver_db_name }}"
    query: >
      INSERT INTO alias (address, goto, domain, active)
      VALUES (
        '{{ item }}',
        '{{ mailserver_noreply_target }}',
        '{{ item.split("@")[1] }}',
        TRUE
      )
      ON CONFLICT (address) DO UPDATE SET
        goto = EXCLUDED.goto,
        modified = NOW();
  loop: "{{ _mailserver_noreply_aliases | default([]) }}"
  when: mailserver_noreply_enabled
