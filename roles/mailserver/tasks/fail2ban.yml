---
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Deploy fail2ban mail jails
  ansible.builtin.template:
    src: fail2ban/jail-mail.conf.j2
    dest: /etc/fail2ban/jail.d/mail.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
