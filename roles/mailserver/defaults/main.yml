---
# Role idempotency guard
role_mailserver_played: false

# ─── General ────────────────────────────────────────────────────────────────────
mailserver_hostname: "mail.{{ mailserver_domain }}"
# MX target — what remote MTAs find via MX lookup. Must be a real A record
# (RFC 2181 §10.3 forbids MX → CNAME). Defaults to mail.<domain>. When
# mailserver_hostname is the apex (PTR = apex), this stays at mail.<domain>
# and the OVH-DNS task creates two A records at the same IP.
mailserver_mx_host: "mail.{{ mailserver_domain }}"
mailserver_domain: "zozoh.fr"
mailserver_admin_email: "admin@{{ mailserver_domain }}"

# List of virtual mail domains to configure
mailserver_domains:
  - "{{ mailserver_domain }}"

# ─── vmail user ─────────────────────────────────────────────────────────────────
mailserver_vmail_uid: 5000
mailserver_vmail_gid: 5000
mailserver_vmail_home: /var/mail
mailserver_vmail_dir: /var/mail/vhosts

# ─── PostgreSQL ─────────────────────────────────────────────────────────────────
mailserver_db_host: "127.0.0.1"
mailserver_db_name: "postfix"
mailserver_db_user: "postfix"
mailserver_db_password: "CHANGEME_DB_PASSWORD"

# ─── Mailboxes & Aliases (managed via Ansible, no web UI) ──────────────────────
# Each entry: { username: "user@domain.tld", password: "plaintext_or_hash", name: "Display Name", quota_mb: 2048 }
# - password is hashed with BLF-CRYPT at apply time
# - quota_mb is optional, falls back to mailserver_quota_default_mb
mailserver_mailboxes: []
#  - username: "enzo@zozoh.fr"
#    password: "changeme"
#    name: "Enzo"
#    quota_mb: 5120

# Each entry: { address: "alias@domain.tld", goto: "target@domain.tld" }
mailserver_aliases: []
#  - address: "postmaster@zozoh.fr"
#    goto: "enzo@zozoh.fr"

# ─── Discard (noreply) ─────────────────────────────────────────────────────────
# When enabled, for each domain in mailserver_domains the role inserts alias rows
# (noreply@<domain>, no-reply@<domain>) that route to a single discard target
# (mailserver_noreply_target) which postfix routes via the discard transport.
mailserver_noreply_enabled: true
mailserver_noreply_users:
  - "noreply"
  - "no-reply"
mailserver_noreply_target: "devnull@localhost"

# ─── Quota ─────────────────────────────────────────────────────────────────────
# Enables Dovecot maildir quota plugin. Per-mailbox limit comes from the DB
# (mailbox.quota, in MB). 0 means unlimited.
mailserver_quota_enabled: true
mailserver_quota_default_mb: 2048
mailserver_quota_warning_percent: 90

# ─── TLS / Let's Encrypt ───────────────────────────────────────────────────────
mailserver_tls_cert: "/etc/letsencrypt/live/{{ mailserver_domain }}/cert.pem"
mailserver_tls_key: "/etc/letsencrypt/live/{{ mailserver_domain }}/privkey.pem"
mailserver_tls_chain: "/etc/letsencrypt/live/{{ mailserver_domain }}/chain.pem"
mailserver_tls_fullchain: "/etc/letsencrypt/live/{{ mailserver_domain }}/fullchain.pem"
mailserver_certbot_email: "{{ mailserver_admin_email }}"
# Set to false if you manage certificates externally
mailserver_certbot_enabled: true
# Extra SAN domains for the cert beyond mailserver_hostname. Leave empty unless
# every entry also has an A record pointing to THIS host (certbot uses --standalone
# on port 80; if the A record points elsewhere the HTTP-01 challenge will fail).
mailserver_certbot_extra_domains: []

# ─── Postfix ────────────────────────────────────────────────────────────────────
mailserver_message_size_limit: 502400000
mailserver_mailbox_size_limit: 1024000000

# Virtual aliases file (system accounts -> mail addresses)
mailserver_virtual_aliases:
  root: "postmaster@{{ mailserver_domain }}"
  clamav: "postmaster@{{ mailserver_domain }}"
  postmaster: "postmaster@{{ mailserver_domain }}"

# ─── DKIM ───────────────────────────────────────────────────────────────────────
mailserver_dkim_selector: "mail"
mailserver_dkim_key_bits: 2048
# Directory for DKIM keys
mailserver_dkim_key_dir: /etc/opendkim/keys

# ─── OpenDMARC ──────────────────────────────────────────────────────────────────
mailserver_dmarc_reject_failures: false

# ─── SpamAssassin ───────────────────────────────────────────────────────────────
mailserver_spamassassin_max_children: 5
mailserver_spamassassin_cron_update: true

# ─── OVH DNS Automation ────────────────────────────────────────────────────────
# Set to true to create DNS records automatically
mailserver_ovh_dns_enabled: false

# OVH API credentials
# Generate at: https://eu.api.ovh.com/createToken/
# Required rights (GET/POST/PUT/DELETE):
#   /domain/zone/*
mailserver_ovh_endpoint: "ovh-eu"
mailserver_ovh_application_key: ""
mailserver_ovh_application_secret: ""
mailserver_ovh_consumer_key: ""
# When true, ovh_dns.py deletes any non-CNAME record (A, AAAA, TXT, MX, SRV)
# that conflicts with a CNAME it wants to create at the same name. Default off:
# the script raises a descriptive error and the play stops, so an operator
# reviews the diff before any DNS rows are removed. Flip to true for a single
# play to clean up legacy debris (e.g. apex-style A records left over from the
# previous mail host), then revert to false to keep destructive ops opt-in.
mailserver_ovh_dns_replace_conflicts: false

# DNS record values (auto-computed if not overridden)
mailserver_dns_mx_priority: 10
mailserver_dns_spf: "v=spf1 mx ip4:{{ _mailserver_public_ip }} ~all"
mailserver_dns_dmarc: "v=DMARC1; p=quarantine; rua=mailto:{{ mailserver_admin_email }}; ruf=mailto:{{ mailserver_admin_email }}; sp=quarantine; ri=86400"

# Server public IP for DNS A records (auto-detected if empty)
mailserver_public_ip: ""

# ─── Password hashing ──────────────────────────────────────────────────────────
mailserver_password_scheme: "BLF-CRYPT"

# ─── Rate limiting ──────────────────────────────────────────────────────────────
mailserver_rate_limit_connections: 10
mailserver_rate_limit_concurrent: 20
mailserver_rate_limit_recipients: 100

# ─── Fail2ban ──────────────────────────────────────────────────────────────────
mailserver_fail2ban_maxretry: 5
mailserver_fail2ban_findtime: 600
mailserver_fail2ban_bantime: 3600

# ─── Backups ───────────────────────────────────────────────────────────────────
mailserver_backup_enabled: true
mailserver_backup_dir: /var/backups/mailserver
mailserver_backup_retention_days: 30

# ─── DANE / TLSA ──────────────────────────────────────────────────────────────
mailserver_dane_enabled: false

# ─── Monitoring ───────────────────────────────────────────────────────────────
mailserver_monitoring_enabled: true

# ─── Additional submission port ────────────────────────────────────────────────
mailserver_extra_submission_port: 2525

# ─── Autoconfig / Autodiscover ─────────────────────────────────────────────────
# Serves Thunderbird (autoconfig.<domain>/mail/config-v1.1.xml) and Outlook
# (autodiscover.<domain>/autodiscover/autodiscover.xml) for every domain in
# mailserver_domains. Static XML, no PHP/FPM.
mailserver_autoconfig_enabled: true
# Host advertised in the XML and SRV records. MUST be covered by the TLS cert
# the mail services use. Default = mail.<primary_domain>, which the per-domain
# wildcard cert covers.
mailserver_autoconfig_advertised_host: "mail.{{ mailserver_domain }}"

# ─── Certbot challenge ─────────────────────────────────────────────────────────
# 'standalone' = legacy HTTP-01 path (port 80, must be free).
# 'dns-ovh'    = DNS-01 via OVH API. Requires python3-certbot-dns-ovh and the
#                same vault_mailserver_ovh_* credentials the DNS automation uses.
# Switch to 'dns-ovh' once OVH credentials are in vault and the role has run
# once successfully with the new package installed.
mailserver_certbot_challenge: standalone
# When true (with dns-ovh) issues one wildcard cert per entry in
# mailserver_domains: -d <d> -d *.<d>. Required for autoconfig/autodiscover
# SANs to be covered without enumerating each one.
mailserver_certbot_wildcards: false
mailserver_certbot_dns_propagation_seconds: 60
