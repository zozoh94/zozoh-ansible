---

- name: Listen SSH for admin
  become: yes
  lineinfile:
    path: "/etc/ssh/sshd_config"
    regexp: ".*PermitRootLogin .+"    
    line: "PermitRootLogin prohibit-password"
    state: present
  notify:
    - Restart sshd

# ── Install Coolify (official installer, idempotent) ─────────────

- name: Download Coolify install script
  ansible.builtin.get_url:
    url: "{{ coolify_install_url }}"
    dest: /opt/coolify-install.sh
    mode: "0755"

- name: Run Coolify installer
  ansible.builtin.command: bash /opt/coolify-install.sh
  args:
    creates: "{{ coolify_source_compose }}"
  register: coolify_install
  # The installer is non-interactive when stdin is not a TTY (Ansible).

- name: Wait for Coolify proxy compose to be generated
  ansible.builtin.stat:
    path: "{{ coolify_proxy_compose }}"
  register: coolify_proxy_stat
  until: coolify_proxy_stat.stat.exists
  retries: 30
  delay: 5

# ── Trust proxy1's PROXY protocol on the https (:443) entrypoint ──
# proxy1's shared stream server sends `proxy_protocol on` to every passthrough
# backend, so Coolify's Traefik must accept it on :443. These edits are
# idempotent (the line regexp prevents duplicates) and re-applied on every run
# in case Coolify regenerated the compose from its UI.

- name: Trust PROXY protocol from proxy1 on https entrypoint
  ansible.builtin.lineinfile:
    path: "{{ coolify_proxy_compose }}"
    insertafter: "--entrypoints\\.https\\.address=:443"
    regexp: "--entrypoints\\.https\\.proxyProtocol\\.trustedIPs="
    line: "      - '--entrypoints.https.proxyProtocol.trustedIPs={{ reverse_proxy_ip }}'"
  notify: Restart coolify proxy

- name: Trust forwarded headers from proxy1 on https entrypoint
  ansible.builtin.lineinfile:
    path: "{{ coolify_proxy_compose }}"
    insertafter: "--entrypoints\\.https\\.address=:443"
    regexp: "--entrypoints\\.https\\.forwardedHeaders\\.trustedIPs="
    line: "      - '--entrypoints.https.forwardedHeaders.trustedIPs={{ reverse_proxy_ip }}'"
  notify: Restart coolify proxy

# ── SMTP egress: resolve smtp.zozoh.fr to the mail server's private IP ──
# Docker's embedded DNS does not read the host's /etc/hosts, and Coolify
# regenerates container compose files, so per-container extra_hosts do not
# stick. Instead run dnsmasq on the host with the override and point the Docker
# daemon's DNS at it — every container (Coolify itself + deployed apps) then
# resolves smtp.zozoh.fr to the internal mail server.

- name: Determine coolify private IP
  ansible.builtin.set_fact:
    coolify_private_ip: "{{ ansible_all_ipv4_addresses | ansible.netcommon.ipaddr(private_network) | first }}"

- name: Install dnsmasq (host resolver for container SMTP override)
  ansible.builtin.apt:
    name: dnsmasq
    state: present

- name: Configure dnsmasq smtp.zozoh.fr override
  ansible.builtin.copy:
    dest: /etc/dnsmasq.d/coolify-smtp.conf
    mode: "0644"
    content: |
      # Managed by Ansible (coolify role) — do not edit manually.
      # Resolve {{ coolify_smtp_host }} to the mail server's private IP so
      # containers deliver mail over the internal network while STARTTLS SNI
      # still matches the public cert. Public DNS points it at proxy1, which
      # does not forward 587.
      bind-interfaces
      listen-address={{ coolify_private_ip }}
      host-record={{ coolify_smtp_host }},{{ coolify_smtp_ip }}
  notify: Restart dnsmasq

- name: Ensure dnsmasq is started and enabled
  ansible.builtin.service:
    name: dnsmasq
    state: started
    enabled: true

- name: Read existing Docker daemon.json (created by Coolify installer)
  ansible.builtin.slurp:
    path: /etc/docker/daemon.json
  register: coolify_daemon_json_raw
  failed_when: false

- name: Merge container DNS into Docker daemon.json
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: >-
      {{ ((coolify_daemon_json_raw.content | b64decode | from_json)
          if (coolify_daemon_json_raw.content is defined) else {})
         | combine({'dns': [coolify_private_ip]}) | to_nice_json }}
  notify: Restart docker

- name: Role coolify played
  ansible.builtin.set_fact:
    role_coolify_played: true
