---
- hosts: pg

  become: yes
  
  vars:
    redis_bind_interface: "{{ ansible_all_ipv4_addresses[1] }}"
    redis_requirepass: "{{ redis_cache_password }}"

    sshd_listen: "{{ ansible_all_ipv4_addresses[0] }}"
    
    postgresql_global_config_options:
      - option: listen_addresses
        value: "{{ ansible_all_ipv4_addresses[1] }}"
      - option: log_directory
        value: "log"

    postgresql_hba_entries:
      - { type: local, database: all, user: postgres, auth_method: peer }
      - { type: local, database: all, user: all, auth_method: peer }
      - { type: host, database: all, user: all, address: '127.0.0.1/32', auth_method: md5 }
      - { type: host, database: all, user: all, address: "{{ private_network }}", auth_method: md5 }

    postgresql_locales:
      - 'en_US.UTF-8'
      - 'fr_FR.UTF-8'
  roles:
    - common
    - geerlingguy.redis
    - geerlingguy.postgresql

  
