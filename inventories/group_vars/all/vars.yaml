---
domain: ovh.zozoh.fr

admin_email: enzo@zozoh.fr

# Cross-cutting /etc/hosts entries applied on every managed host by the common role.
# Use this for service names whose public DNS doesn't reach the private network
# (e.g. smtp.zozoh.fr resolves to the proxy public IP which doesn't forward 587).
global_hosts:
  smtp.zozoh.fr: 192.168.0.97

common_tools:
  - curl
  - htop
  - emacs-nox
  - git
  - vim

postgresql_packages:
  - postgresql
  - postgresql-contrib
  - libpq-dev
  - postgis
  - postgresql-11-postgis-2.5

# Proxmox API used by playbooks/upgrade-debian.yaml.
# Per-host VMIDs live as host vars in inventories/all.yaml.
# Secrets (token id + secret) are in inventories/group_vars/all/vault.yaml.
proxmox_api_host: ovh.zozoh.fr
proxmox_api_port: 8006
proxmox_api_user: enzo@pam!ansible-backup
proxmox_node: pve
proxmox_api_validate_certs: true
