---
private_network: "192.168.0.224/27"
admin_network: "192.168.1.224/27"

group_hosts:
  gitlab.ovh.zozoh.fr: 192.168.0.66

certbot_certs:
  - domains:
      - gitlab.zozoh.fr
  - domains:
      - registry.zozoh.fr
  - domains:
      - pages.zozoh.fr
      - enzo.pages.zozoh.fr
  - domains:
      - lagabelle-saint-hilaire.fr
      - media.lagabelle-saint-hilaire.fr
certbot_admin_email: "{{ admin_email }}"
certbot_create_if_missing: true
certbot_create_standalone_stop_services:
  - nginx

nginx_package_name: "nginx-extras"
nginx_listen_ipv6: false
nginx_upstreams:
  - name: gitlab
    servers:
      - "gitlab:80 fail_timeout=0"
  - name: gitlab_registry
    servers:
      - "gitlab:5678"
  - name: legacy
    servers:
      - "192.168.0.97:443"
  - name: lagabelle-saint-hilaire
    servers:
      - "192.168.0.129:8000"
  - name: lagabelle-saint-hilaire_media
    servers:
      - "192.168.0.129:8001"
nginx_extra_http_options: |
  fastcgi_cache_path /var/cache/nginx_cgi levels=1:2 keys_zone=cgi:10m inactive=1h max_size=1g;
  
  map $upstream_http_docker_distribution_api_version $docker_distribution_api_version {
    '' 'registry/2.0';
  }

nginx_extra_conf_options: |
  load_module /usr/lib/nginx/modules/ngx_stream_module.so;
  
  stream {
    map_hash_bucket_size 256;

    map $ssl_preread_server_name $targetBackend {
      hostnames;
      
      gitlab.zozoh.fr 127.0.0.1:4443;
      registry.zozoh.fr 127.0.0.1:4443;
      pages.zozoh.fr 127.0.0.1:4443;
      enzo.pages.zozoh.fr 127.0.0.1:4443;
      lagabelle-saint-hilaire.fr 127.0.0.1:4443;
      media.lagabelle-saint-hilaire.fr 127.0.0.1:4443;
      
      autodiscover.lagabelle-saint-hilaire.fr 192.168.0.97:443;
      autoconfig.lagabelle-saint-hilaire.fr 192.168.0.97:443;
      .zozoh.fr 192.168.0.97:443;
    }
  
    server {
      listen 443; 
    
      proxy_pass $targetBackend;       
      ssl_preread on;
      proxy_protocol on;
    }
  }
nginx_proxy_cache_path: "/var/cache/nginx_reverse levels=1:2 keys_zone=reverse:10m max_size=10g inactive=60m"
nginx_vhosts:
  - listen: "80"
    server_name: "ovh.zozoh.fr"
    extra_parameters: |
      location / {
        gzip                    off;

        proxy_set_header        Host                $http_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Frame-Options     SAMEORIGIN;
        
        proxy_pass http://192.168.0.254;
      }
  - listen: "80"
    server_name: "gitlab.zozoh.fr"
    extra_parameters: |
      return 301 https://gitlab.zozoh.fr$request_uri;
  - listen: "4443 ssl http2 proxy_protocol"
    server_name: "gitlab.zozoh.fr"
    access_log: "/var/log/nginx/gitlab.access.log"
    error_log: "/var/log/nginx/gitlab.error.log"
    state: "present"
    extra_parameters: |
      server_tokens off;
      location / {
        gzip                    off;
        
        proxy_read_timeout      300;
        proxy_connect_timeout   300;
        proxy_redirect          off;

        proxy_set_header        Host                $http_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Frame-Options     SAMEORIGIN;

        proxy_cache reverse;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503
        http_504;
        proxy_cache_lock on;

        proxy_pass http://gitlab;
      }
      ssl_certificate /etc/letsencrypt/live/gitlab.zozoh.fr/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/gitlab.zozoh.fr/privkey.pem;
      include /etc/nginx/ssl_options;
      ssl_dhparam /etc/nginx/ssl_dhparams.pem;
  - listen: "80"
    server_name: "pages.zozoh.fr"
    extra_parameters: |
      return 301 https://pages.zozoh.fr$request_uri;
  - listen: "80"
    server_name: "enzo.pages.zozoh.fr"
    extra_parameters: |
      return 301 https://enzo.pages.zozoh.fr$request_uri;
  - listen: "4443 ssl http2 proxy_protocol"
    server_name: "pages.zozoh.fr enzo.pages.zozoh.fr"
    access_log: "/var/log/nginx/pages.access.log"
    error_log: "/var/log/nginx/pages.error.log"
    state: "present"
    extra_parameters: |
      server_tokens off;
      location / {
        gzip                    off;
        
        proxy_read_timeout      300;
        proxy_connect_timeout   300;
        proxy_redirect          off;

        proxy_set_header        Host                $http_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Frame-Options     SAMEORIGIN;

        proxy_cache reverse;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503
        http_504;
        proxy_cache_lock on;

        proxy_pass http://gitlab;
      }
      ssl_certificate /etc/letsencrypt/live/pages.zozoh.fr/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/pages.zozoh.fr/privkey.pem;
      include /etc/nginx/ssl_options;
      ssl_dhparam /etc/nginx/ssl_dhparams.pem;
  - listen: "80"
    server_name: "registry.zozoh.fr"
    extra_parameters: |
      return 301 https://registry.zozoh.fr$request_uri;
  - listen: "4443 ssl http2 proxy_protocol"
    server_name: "registry.zozoh.fr"
    access_log: "/var/log/nginx/registry.access.log"
    error_log: "/var/log/nginx/registry.error.log"
    state: "present"
    extra_parameters: |
      location /v2/ {
        gzip                    off;

        if ($http_user_agent ~ "^(docker\/1\.(3|4|5(?!\.[0-9]-dev))|Go ).*$" ) {
          return 404;
        }

        client_max_body_size 1G;

        add_header 'Docker-Distribution-Api-Version' $docker_distribution_api_version always;

        proxy_set_header        Host                $http_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Frame-Options     SAMEORIGIN;

        proxy_pass http://gitlab_registry;
      }
      ssl_certificate /etc/letsencrypt/live/registry.zozoh.fr/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/registry.zozoh.fr/privkey.pem;
      include /etc/nginx/ssl_options;
      ssl_dhparam /etc/nginx/ssl_dhparams.pem;     
  - listen: "80"
    server_name: "lagabelle-saint-hilaire.fr"
    extra_parameters: |
      return 301 https://lagabelle-saint-hilaire.fr$request_uri;
  - listen: "4443 ssl http2 proxy_protocol"
    server_name: "lagabelle-saint-hilaire.fr"
    access_log: "/var/log/nginx/lagabelle-saint-hilaire.access.log"
    error_log: "/var/log/nginx/lagabelle-saint-hilaire.error.log"
    state: "present"
    extra_parameters: |
      server_tokens off;
      location / {
        gzip                    off;
        
        proxy_read_timeout      300;
        proxy_connect_timeout   300;
        proxy_redirect          off;

        proxy_set_header        Host                $http_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Frame-Options     SAMEORIGIN;

        proxy_cache reverse;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503
        http_504;
        proxy_cache_lock on;

        proxy_pass http://lagabelle-saint-hilaire;
      }
      ssl_certificate /etc/letsencrypt/live/lagabelle-saint-hilaire.fr/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/lagabelle-saint-hilaire.fr/privkey.pem;
      include /etc/nginx/ssl_options;
      ssl_dhparam /etc/nginx/ssl_dhparams.pem; 
  - listen: "80"
    server_name: "media.lagabelle-saint-hilaire.fr"
    extra_parameters: |
      return 301 https://media.lagabelle-saint-hilaire.fr$request_uri;
  - listen: "4443 ssl http2 proxy_protocol"
    server_name: "media.lagabelle-saint-hilaire.fr"
    access_log: "/var/log/nginx/lagabelle-saint-hilaire.access.log"
    error_log: "/var/log/nginx/lagabelle-saint-hilaire.error.log"
    state: "present"
    extra_parameters: |
      server_tokens off;
      location / {
        gzip                    off;
        
        proxy_read_timeout      300;
        proxy_connect_timeout   300;
        proxy_redirect          off;

        proxy_set_header        Host                $http_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Frame-Options     SAMEORIGIN;

        proxy_cache reverse;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503
        http_504;
        proxy_cache_lock on;

        proxy_pass http://lagabelle-saint-hilaire_media;
      }
      ssl_certificate /etc/letsencrypt/live/lagabelle-saint-hilaire.fr/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/lagabelle-saint-hilaire.fr/privkey.pem;
      include /etc/nginx/ssl_options;
      ssl_dhparam /etc/nginx/ssl_dhparams.pem; 
  - listen: "80"
    server_name: "zozoh.fr imap.zozoh.fr smtp.zozoh.fr collaboraonline.zozoh.fr postfix.zozoh.fr mail.zozoh.fr cloud.zozoh.fr autoconfig.zozoh.fr autodiscover.zozoh.fr autoconfig.lagabelle-saint-hilaire.fr autodiscover.lagabelle-saint-hilaire.fr"
    extra_parameters: |
      location / {
        gzip                    off;

        proxy_set_header        Host                $http_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Frame-Options     SAMEORIGIN;
        
        proxy_pass http://192.168.0.97;
      }      
